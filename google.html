<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
</head>
<style>
    body {
        background-color: #fff;
        font-family: 'Product Sans', sans-serif;
        text-align: center;
        padding-top: 100px;
    }

    .container {
        display: 800px;
        max-width: 800px;
        margin: 0 auto;
    }

    .logo {
        font-size: 120px;
        font-weight: bold;
        letter-spacing: -19px;
        margin-bottom: 100px;
    }

    .go
    {
        color: blue;
    }
    .o {
        color: red;}

    .m {
        color: yellowgreen;}
        
    .gm {
        color: blue;}
        
    .l {
        color: green;}
    .e {
        color: red;}
        
    input {width: 100%;
            padding: 25px;
            padding-left: 40px;
            border: none;
            border-radius: 25px;
            box-shadow: 10px 10px 10px rgba(0,0,0,0.1);
            margin-bottom: 100px;}
    .gmage {gap: 60px;
            display: flex;
            justify-content: center;
        }
    .gmage img {border-radius: 50%;
                height: 40px;
                width: 40px;
                 gap: 50px;}
    .gma {background-color: rgba(105, 105, 105, 0.15);
           padding: 20px;
            border-radius: 50%;}
    input::placeholder {font-size: 20px;
                        font-weight: bold;}

    .input-container {
        position: relative;
        width: 100%;
    }

    .icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-60px);
        width: 20px;
        height: 20px;
        ;
    }
  .icon1 {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-60px);
        transform: translateX(300px);
        width: 20px;
        height: 20px;
        ;
    }
  </style>

<body>
  
        <div class="container">

           <h1> <div class="logo">

                <span class="go">G</span>
                <span class="o">o</span>
                <span class="m">o</span>
                <span class="gm">g</span>
                <span class="l">l</span>
                <span class="e">e</span></div></h1>
        

            <div class="input-container">
           <img src="search.png" class="icon">
           <img src="google-voice.png" class="icon1" style="left: 350px; top: 50%; transform: translateY(-60px);">
           <input  placeholder="Search Google or type a Url">
            </div>


        <div class="gmage">
            <span class="gma"><img src="download.png" alt="Google Logo"></span>
            <span class="gma"><img src="plus.png" alt="add"></span>

        </div>

        </div>

        

</body>
</html>
